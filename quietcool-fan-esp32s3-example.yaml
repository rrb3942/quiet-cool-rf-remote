# Seeed XIAO ESP32-S3 on the ESP-IDF framework.
# The esp32dev / Arduino equivalent is quietcool-fan-example.yaml.
esphome:
  name: quietcool-s3-junk
  friendly_name: QuietCoolFan-s3-junk

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG

api:
  encryption:
    key: !secret api_enctryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Quietcool Fallback Hotspot"
    password: "iifozSf0C018"

captive_portal:

external_components:
  - source:
      type: local
      path: components
    components: [quiet_cool]

# XIAO ESP32-S3 pin mapping:
#   GPIO7 = D8, GPIO8 = D9, GPIO9 = D10, GPIO1 = D0, GPIO2 = D1, GPIO4 = D3
fan:
  - platform: quiet_cool
    name: QuietCool fan
    clk_pin: 7
    miso_pin: 8
    mosi_pin: 9
    cs_pin: 1
    gdo0_pin: 2
    gdo2_pin: 4
    remote_id: [0x2D, 0xD4, 0x06, 0xCB, 0x00, 0xF7, 0xF2]
    restore_mode: RESTORE_DEFAULT_OFF
