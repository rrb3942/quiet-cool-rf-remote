name: ESPHome CI

on:
  push:
    paths:
      - '**.yaml'
      - 'components/**'
      - '.github/workflows/esphome-ci.yml'
  pull_request:
    paths:
      - '**.yaml'
      - 'components/**'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install esphome

      - name: Install Platformio
        run: |
          pip install platformio

      - name: Create dummy secrets
        run: |
          # so esphome compile won’t error out
          cat <<EOF > secrets.yaml
          wifi_ssid: dummy_ssid
          wifi_password: dummy_password
          api_enctryption_key: 1HUvrwkoGd889qBYWEjK7QtFbfIAE89r4p68rMxnc+U=
          ota_password: dummy_ota_password
          EOF

      - name: Compile quietcool example (esp32dev / arduino)
        run: esphome compile quietcool-fan-example.yaml

      # Exercises the arduino_compat.h shim: under esp-idf there is no Arduino.h,
      # so the vendored CC1101 driver builds against the software-SPI shim instead.
      - name: Compile quietcool example (xiao esp32s3 / esp-idf)
        run: esphome compile quietcool-fan-esp32s3-example.yaml

      - name: Compile arduino sketch
        run: |
          cd arduino
          pio run
